<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChessMaster — by Abdullah Javid</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{--bl:#1e293b;--bd:#0f172a;--bg:#020617;--pr:#3b82f6;--acc:#00f2ff;--card:rgba(15,23,42,.85);--bdr:rgba(255,255,255,.08);--muted:#64748b;--txt:#f8fafc}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;transition:background .4s}
header{text-align:center;margin-bottom:12px}
h1{font-family:'Outfit',sans-serif;font-size:clamp(1.6rem,4vw,2.8rem);font-weight:900;letter-spacing:-2px}
h1 span{color:var(--pr)}
.tagline{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.game-wrap{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:960px}
/* Player cards */
.pcard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:8px 14px;width:100%;max-width:520px;display:flex;flex-direction:column;gap:4px}
.pcard.active{border-color:var(--pr);box-shadow:0 0 14px rgba(59,130,246,.25)}
.pcard-top{display:flex;align-items:center;justify-content:space-between}
.pname{font-weight:700;font-size:14px}
.ptimer{font-family:monospace;font-size:1.3rem;font-weight:900;color:var(--pr)}
.ptimer.low{color:#ef4444;animation:blink .7s infinite}
.caps{display:flex;flex-wrap:wrap;gap:1px;min-height:18px;font-size:13px;opacity:.75}
.adv{font-size:11px;font-weight:700;color:var(--pr);margin-left:4px}
/* Board + eval */
.eval-board{display:flex;gap:6px;align-items:stretch}
.eval-bar-wrap{display:flex;flex-direction:column;align-items:center;width:18px;gap:4px}
.eval-bar{flex:1;background:#1e293b;border-radius:6px;overflow:hidden;position:relative;min-height:200px;border:1px solid var(--bdr)}
#eval-fill{position:absolute;bottom:0;left:0;right:0;background:var(--txt);transition:height .4s ease;height:50%}
.eval-label{font-size:9px;font-weight:700;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg)}
#eval-score{font-size:9px;font-weight:700;color:var(--muted)}
/* Board */
#board{display:grid;grid-template-columns:repeat(8,1fr);width:min(500px,88vw);height:min(500px,88vw);border:5px solid var(--bd);border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.sq{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background-color .1s}
.sq.light{background:var(--bl)}.sq.dark{background:var(--bd)}
.sq.selected{background:rgba(59,130,246,.5)!important}
.sq.last-move{background:rgba(0,242,255,.2)!important}
.sq.hint-sq{background:rgba(245,158,11,.38)!important}
.sq.check-sq{background:rgba(239,68,68,.45)!important;animation:checkpulse 1s infinite}
.sq.valid::after{content:'';position:absolute;width:30%;height:30%;background:rgba(59,130,246,.6);border-radius:50%;pointer-events:none}
.sq.valid-cap::after{content:'';position:absolute;inset:4%;border:3px solid rgba(59,130,246,.6);border-radius:50%;pointer-events:none}
.sq.disambig-src{background:rgba(168,85,247,.55)!important;animation:dpulse .7s infinite}
.sq.drag-src .piece{opacity:.2}
.sq.nav-sq{background:rgba(234,179,8,.3)!important}
.piece{width:82%;height:82%;z-index:2;pointer-events:none;filter:drop-shadow(0 2px 5px rgba(0,0,0,.7))}
.drag-piece{position:fixed;pointer-events:none;z-index:999;width:62px;height:62px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.8));transform:scale(1.18)}
.coord-r{position:absolute;left:2px;top:2px;font-size:9px;font-weight:700;opacity:.4;pointer-events:none;color:inherit}
.coord-f{position:absolute;right:2px;bottom:1px;font-size:9px;font-weight:700;opacity:.4;pointer-events:none;color:inherit}
/* Nav controls */
.nav-bar{display:flex;gap:6px;justify-content:center;margin-top:6px;width:100%;max-width:520px}
.nav-btn{background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);padding:6px 12px;font-size:16px;cursor:pointer;transition:all .2s;flex:1}
.nav-btn:hover{background:rgba(59,130,246,.2);border-color:var(--pr)}
.nav-btn:disabled{opacity:.3;cursor:default}
/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:10px;min-width:220px;max-width:270px}
.glass{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px}
.glass h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
#status{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0}
.dot.red{background:#ef4444;animation:none}.dot.yellow{background:#f59e0b}
.check-badge{background:rgba(239,68,68,.2);color:#ef4444;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:5px;display:none}
.elo-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;font-size:12px}
.elo-val{color:var(--pr);font-weight:700;font-size:14px}
.stats-row{display:flex;gap:8px;font-size:11px;color:var(--muted)}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.stat-num{font-weight:700;font-size:14px;color:var(--txt)}
.stat-num.green{color:#22c55e}.stat-num.red{color:#ef4444}.stat-num.gray{color:#94a3b8}
/* Buttons */
.btn{background:var(--pr);color:#fff;border:none;border-radius:9px;padding:9px 12px;font-weight:700;font-size:12px;cursor:pointer;width:100%;margin-top:4px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn.outline{background:transparent;border:1px solid var(--bdr);color:#94a3b8}
.btn.outline:hover{background:rgba(255,255,255,.08);color:var(--txt)}
.btn.danger{background:transparent;border:1px solid rgba(239,68,68,.3);color:#ef4444}
.btn.danger:hover{background:rgba(239,68,68,.12)}
.btn.amber{background:transparent;border:1px solid rgba(245,158,11,.3);color:#f59e0b}
.btn.amber:hover{background:rgba(245,158,11,.1)}
.btn.green-btn{background:transparent;border:1px solid rgba(34,197,94,.3);color:#22c55e}
.btn.green-btn:hover{background:rgba(34,197,94,.1)}
/* Grid buttons */
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.diff-btn,.tc-btn{padding:7px 5px;border-radius:7px;border:1px solid var(--bdr);background:rgba(15,23,42,.6);color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.diff-btn.active,.tc-btn.active{border-color:var(--pr);color:var(--txt);background:rgba(59,130,246,.18)}
.diff-btn:hover,.tc-btn:hover{border-color:var(--pr);color:var(--txt)}
/* Move history */
#moves{max-height:180px;overflow-y:auto;font-family:monospace;font-size:12px}
#moves::-webkit-scrollbar{width:3px}
#moves::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.move-row{display:grid;grid-template-columns:24px 1fr 1fr;padding:2px 4px;border-radius:4px;cursor:pointer}
.move-row:hover{background:rgba(255,255,255,.07)}
.move-row.current{background:rgba(59,130,246,.2)}
.move-num{color:var(--muted)}.move-w{color:var(--txt);font-weight:600}.move-b{color:#94a3b8}
/* Themes */
.theme-row{display:flex;gap:8px;margin-top:4px}
.theme-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.theme-dot.active{border-color:#fff;transform:scale(1.15)}
/* Modals */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadein .2s}
.modal-box{background:#0f172a;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:32px;max-width:360px;width:90%;text-align:center}
.modal-box h2{font-family:'Outfit',sans-serif;font-size:1.9rem;font-weight:900;margin-bottom:6px}
.modal-box p{color:#94a3b8;margin-bottom:20px}
.modal-actions{display:flex;gap:8px}.modal-actions .btn{flex:1}
.promo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.promo-piece{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:10px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#94a3b8}
.promo-piece:hover{border-color:var(--pr);background:rgba(59,130,246,.1)}
/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes checkpulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(239,68,68,0)}50%{box-shadow:inset 0 0 0 3px rgba(239,68,68,.7)}}
@keyframes dpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@media(max-width:600px){.sidebar{max-width:100%;min-width:unset;width:100%}}
</style>
</head>
<body>
<header>
  <h1>CHESS<span>MASTER</span></h1>
  <p class="tagline">Built by Abdullah Javid</p>
</header>

<div class="game-wrap">
  <!-- Board column -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:7px">
    <div class="pcard" id="card-top">
      <div class="pcard-top">
        <span class="pname" id="name-top">AI (Medium)</span>
        <span class="ptimer" id="timer-top">10:00</span>
      </div>
      <div class="caps" id="caps-top"></div>
    </div>

    <div class="eval-board">
      <div class="eval-bar-wrap">
        <div class="eval-label">White</div>
        <div class="eval-bar"><div id="eval-fill"></div></div>
        <span id="eval-score">0.0</span>
        <div class="eval-label">Black</div>
      </div>
      <div id="board"></div>
    </div>

    <div class="pcard active" id="card-bot">
      <div class="pcard-top">
        <span class="pname" id="name-bot">You (White)</span>
        <span class="ptimer" id="timer-bot">10:00</span>
      </div>
      <div class="caps" id="caps-bot"></div>
    </div>

    <!-- Move navigation -->
    <div class="nav-bar">
      <button class="nav-btn" id="nav-start" onclick="navGo(0)" title="Start">⏮</button>
      <button class="nav-btn" id="nav-prev"  onclick="navGo(navIdx-1)" title="Previous">◀</button>
      <button class="nav-btn" id="nav-live"  onclick="navGo(-1)" title="Live">●</button>
      <button class="nav-btn" id="nav-next"  onclick="navGo(navIdx+1)" title="Next">▶</button>
      <button class="nav-btn" id="nav-end"   onclick="navGo(9999)" title="End">⏭</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Status -->
    <div class="glass">
      <h3>Status</h3>
      <div id="status"><div class="dot" id="dot"></div><span id="status-text">Your turn</span></div>
      <div class="check-badge" id="check-badge">⚠ CHECK!</div>
      <div class="elo-row">
        <span style="color:var(--muted);font-size:12px">Your ELO</span>
        <span class="elo-val" id="elo-disp">800</span>
      </div>
      <div class="stats-row" style="margin-top:6px">
        <div class="stat-item"><span class="stat-num green" id="sw">0</span><span>Wins</span></div>
        <div class="stat-item"><span class="stat-num red" id="sl">0</span><span>Losses</span></div>
        <div class="stat-item"><span class="stat-num gray" id="sd">0</span><span>Draws</span></div>
        <div class="stat-item"><span class="stat-num" id="sg">0</span><span>Games</span></div>
      </div>
      <button class="btn outline" id="snd-btn" onclick="toggleSound()" style="margin-top:8px">🔊 Sound ON</button>
    </div>

    <!-- Difficulty -->
    <div class="glass">
      <h3>Difficulty</h3>
      <div class="btn-grid" style="margin-bottom:6px">
        <button class="diff-btn" onclick="setDiff('beginner',this)">🟢 Beginner</button>
        <button class="diff-btn" onclick="setDiff('easy',this)">🔵 Easy</button>
        <button class="diff-btn active" onclick="setDiff('medium',this)">🟡 Medium</button>
        <button class="diff-btn" onclick="setDiff('hard',this)">🔴 Hard</button>
        <button class="diff-btn" onclick="setDiff('master',this)">👑 Master</button>
        <button class="diff-btn" onclick="setDiff('local',this)">👥 2 Players</button>
      </div>
      <h3 style="margin-top:8px">Time Control</h3>
      <div class="btn-grid">
        <button class="tc-btn" onclick="setTC(60,'Bullet 1+0',this)">⚡ 1+0</button>
        <button class="tc-btn" onclick="setTC(180,'Blitz 3+2',this)">🔥 3+2</button>
        <button class="tc-btn active" onclick="setTC(600,'Rapid 10+5',this)">⏱ 10+5</button>
        <button class="tc-btn" onclick="setTC(1800,'Classical 30',this)">🎓 30+0</button>
        <button class="tc-btn" onclick="setTC(Infinity,'Unlimited',this)">∞ ∞</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="glass">
      <h3>Actions</h3>
      <button class="btn" onclick="newGame()">▶ New Game</button>
      <button class="btn amber" onclick="requestHint()">💡 Hint</button>
      <button class="btn outline" onclick="undoMove()">↩ Undo Move</button>
      <button class="btn green-btn" onclick="exportPGN()" id="pgn-btn">📋 Copy PGN</button>
      <button class="btn danger" onclick="resignGame()">⚑ Resign</button>
    </div>

    <!-- Move History -->
    <div class="glass">
      <h3>Move History</h3>
      <div id="moves"><p style="color:var(--muted);font-size:11px;text-align:center;padding:6px">No moves yet</p></div>
    </div>

    <!-- Board Theme -->
    <div class="glass">
      <h3>Board Theme</h3>
      <div class="theme-row">
        <div class="theme-dot active" style="background:linear-gradient(135deg,#1e293b 50%,#0f172a 50%)" onclick="setTheme('dark',this)" title="Dark"></div>
        <div class="theme-dot" style="background:linear-gradient(135deg,#eeeed2 50%,#769656 50%)" onclick="setTheme('green',this)" title="Classic"></div>
        <div class="theme-dot" style="background:linear-gradient(135deg,#dee3e6 50%,#5f8bba 50%)" onclick="setTheme('blue',this)" title="Blue"></div>
        <div class="theme-dot" style="background:linear-gradient(135deg,#f0d9b5 50%,#b58863 50%)" onclick="setTheme('wood',this)" title="Wood"></div>
        <div class="theme-dot" style="background:linear-gradient(135deg,#2d2d2d 50%,#1a1a1a 50%)" onclick="setTheme('mono',this)" title="Mono"></div>
      </div>
    </div>
  </div>
</div>

<!-- Promotion Modal -->
<div class="modal" id="promo-modal" style="display:none">
  <div class="modal-box">
    <h2>Promote Pawn</h2><p>Choose a piece</p>
    <div class="promo-grid" id="promo-grid"></div>
  </div>
</div>

<!-- Game Over Modal -->
<div class="modal" id="over-modal" style="display:none">
  <div class="modal-box">
    <div id="over-icon" style="font-size:3rem;margin-bottom:10px">🏆</div>
    <h2 id="over-title">Victory!</h2>
    <p id="over-msg"></p>
    <div id="over-elo" style="font-size:13px;color:var(--pr);margin-bottom:14px;font-weight:700"></div>
    <div class="modal-actions">
      <button class="btn" onclick="newGame()">▶ Play Again</button>
      <button class="btn outline" onclick="exportPGN()">📋 PGN</button>
    </div>
  </div>
</div>

<script type="module">
import{Chess}from'https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.8/+esm';

// ── Web Worker AI ─────────────────────────────────────────────────────────
const WSRC=`
import{Chess}from'https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.8/+esm';
const PV={p:100,n:320,b:330,r:500,q:900,k:20000};
const PST={p:[[0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],[5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],[5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]],n:[[-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],[-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],[-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],[-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]],b:[[-20,-10,-10,-10,-10,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,10,10,5,0,-10],[-10,5,5,10,10,5,5,-10],[-10,0,10,10,10,10,0,-10],[-10,10,10,10,10,10,10,-10],[-10,5,0,0,0,0,5,-10],[-20,-10,-10,-10,-10,-10,-10,-20]],r:[[0,0,0,0,0,0,0,0],[5,10,10,10,10,10,10,5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[0,0,0,5,5,0,0,0]],q:[[-20,-10,-10,-5,-5,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,5,5,5,0,-10],[-5,0,5,5,5,5,0,-5],[0,0,5,5,5,5,0,-5],[-10,5,5,5,5,5,0,-10],[-10,0,5,0,0,0,0,-10],[-20,-10,-10,-5,-5,-10,-10,-20]],k:[[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-20,-30,-30,-40,-40,-30,-30,-20],[-10,-20,-20,-20,-20,-20,-20,-10],[20,20,0,0,0,0,20,20],[20,30,10,0,0,10,30,20]]};
function ev(g){if(g.isCheckmate())return g.turn()==='w'?-99999:99999;if(g.isDraw())return 0;let s=0;const b=g.board();for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(!p)continue;const row=p.color==='w'?r:7-r;s+=p.color==='w'?(PV[p.type]||0)+(PST[p.type]?.[row]?.[c]||0):-((PV[p.type]||0)+(PST[p.type]?.[row]?.[c]||0))}return s;}
function sm(m){if(m.san.includes('#'))return 1e5;if(m.captured)return(PV[m.captured]||0)*10-(PV[m.piece]||0);if(m.san.includes('+'))return 50;if(m.san==='O-O'||m.san==='O-O-O')return 30;return 0;}
function mm(g,d,a,b,mx){if(d===0||g.isGameOver())return ev(g);const mvs=g.moves({verbose:true}).sort((a,b)=>sm(b)-sm(a));if(mx){let best=-Infinity;for(const m of mvs){g.move(m);const v=mm(g,d-1,a,b,false);g.undo();if(v>best)best=v;if(v>a)a=v;if(b<=a)break;}return best;}else{let best=Infinity;for(const m of mvs){g.move(m);const v=mm(g,d-1,a,b,true);g.undo();if(v<best)best=v;if(v<b)b=v;if(b<=a)break;}return best;}}
const DP={beginner:1,easy:2,medium:3,hard:4,master:5};
function bestMove(g,d){const mvs=g.moves({verbose:true});if(!mvs.length)return null;if(d==='beginner'){const c=mvs.filter(m=>m.captured),k=mvs.filter(m=>m.san.includes('#')||m.san.includes('+'));const p=k.length&&Math.random()>.4?k:c.length&&Math.random()>.5?c:mvs;return p[Math.floor(Math.random()*p.length)];}if(d==='easy'){const sc=mvs.map(m=>({m,s:sm(m)+Math.random()*60})).sort((a,b)=>b.s-a.s);return sc[Math.floor(Math.random()*Math.min(5,sc.length))].m;}const isW=g.turn()==='w',noise=d==='medium'?15:d==='hard'?5:0,ord=[...mvs].sort((a,b)=>sm(b)-sm(a));let bm=ord[0],bs=isW?-Infinity:Infinity;for(const m of ord){g.move(m);const s=mm(g,DP[d]-1,-Infinity,Infinity,!isW)+Math.random()*noise;g.undo();if(isW?s>bs:s<bs){bs=s;bm=m;}}return bm;}
self.onmessage=(e)=>{const{fen,d,isHint,warmup}=e.data;const g=new Chess(fen);if(warmup){bestMove(g,'easy');self.postMessage({warmup:true});return;}const mv=bestMove(g,d);self.postMessage({san:mv?.san??null,from:mv?.from??null,to:mv?.to??null,isHint:!!isHint});};
`;
let aiWorker=null;
try{
  const blob=new Blob([WSRC],{type:'text/javascript'});
  aiWorker=new Worker(URL.createObjectURL(blob),{type:'module'});
  aiWorker.onmessage=(e)=>{
    if(e.data.warmup)return;
    const{san,from,to,isHint}=e.data;
    if(isHint){isHinting=false;if(from&&to){hints=[from,to];if(htTO)clearTimeout(htTO);htTO=setTimeout(()=>{hints=[];render();},3000);}render();}
    else{aiOn=false;if(san)doMove(san);else render();}

  const topCap=sort(cap.b); // black captured white pieces → show white unicode
  const botCap=sort(cap.w); // white captured black pieces → show black unicode
  const advTop=adv(cap.b,cap.w); // black's material advantage
  const advBot=adv(cap.w,cap.b);
  document.getElementById('caps-top').innerHTML=topCap.map(p=>PC[p.toUpperCase()]||'').join('')+(advTop>0?`<span class="adv">+${advTop}</span>`:'');
  document.getElementById('caps-bot').innerHTML=botCap.map(p=>PC[p]||'').join('')+(advBot>0?`<span class="adv">+${advBot}</span>`:'');
}

// ── Timer ─────────────────────────────────────────────────────────────────
let tcLabel='Rapid 10+5';
window.setTC=(secs,label,btn)=>{
  baseTime=secs;tcLabel=label;
  document.querySelectorAll('.tc-btn').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
};
function fmt(s){if(s===Infinity)return'∞';return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
function tick(){
  if(gameOver){clearInterval(timerIv);return;}
  timers[game.turn()]=Math.max(0,timers[game.turn()]-0.1);
  if(timers[game.turn()]<=0){
    clearInterval(timerIv);const l=game.turn();gameOver=true;
    const res=l==='w'?'loss':'win';
    const delta=updateElo(res);playSound(res==='win'?'win':'lose');
    showOver('⏰',l==='w'?'Black Wins!':'White Wins!',`${l==='w'?'White':'Black'} ran out of time!`,delta);
  }
  renderTimers();
}
function renderTimers(){
  const tt=document.getElementById('timer-top'),tb=document.getElementById('timer-bot');
  tt.textContent=fmt(timers.b);tb.textContent=fmt(timers.w);
  tt.className='ptimer'+(timers.b<30&&timers.b>0?' low':'');
  tb.className='ptimer'+(timers.w<30&&timers.w>0?' low':'');
}

// ── Move Navigation ───────────────────────────────────────────────────────
window.navGo=(idx)=>{
  const hist=game.history();
  if(!hist.length){navIdx=-1;render();return;}
  if(idx===-1||idx>=hist.length){navIdx=-1;}
  else navIdx=Math.max(0,Math.min(hist.length-1,idx));
  render();
};

// ── Drag & Drop ───────────────────────────────────────────────────────────
function startDrag(sq,e){
  if(gameOver||aiOn||isHinting||navIdx!==-1)return;
  if(!isLocal&&game.turn()==='b')return;
  const mvs=game.moves({verbose:true}).filter(m=>m.from===sq);
  if(!mvs.length)return;
  e.preventDefault();dragSq=sq;sel=sq;disambig=null;
  const pieceEl=e.currentTarget;
  dragEl=document.createElement('div');dragEl.className='drag-piece';dragEl.innerHTML=pieceEl.innerHTML;
  document.body.appendChild(dragEl);moveDrag(e);render();
}
function moveDrag(e){if(!dragEl)return;const x=(e.clientX||e.touches?.[0]?.clientX||0),y=(e.clientY||e.touches?.[0]?.clientY||0);dragEl.style.left=(x-31)+'px';dragEl.style.top=(y-31)+'px';}
function endDrag(e){
  if(!dragEl||!dragSq)return;
  const x=(e.clientX||e.changedTouches?.[0]?.clientX||0),y=(e.clientY||e.changedTouches?.[0]?.clientY||0);
  dragEl.remove();dragEl=null;
  const from=dragSq;dragSq=null;
  const el=document.elementFromPoint(x,y),sqEl=el?.closest('[data-sq]'),to=sqEl?.dataset?.sq;
  if(to&&to!==from){const mv=game.moves({verbose:true}).find(m=>m.from===from&&m.to===to);if(mv){sel=null;disambig=null;if(mv.flags?.includes('p')){promo={from,to};showPromo(game.turn());return;}doMove(mv.san);return;}}
  sel=null;render();
}
document.addEventListener('pointermove',moveDrag,{passive:true});
document.addEventListener('pointerup',endDrag);

// ── Render ────────────────────────────────────────────────────────────────
function sm(m){if(m.san.includes('#'))return 1e5;if(m.captured)return(PV2[m.captured]||0)*10-(PV2[m.piece]||0);if(m.san.includes('+'))return 50;if(m.san==='O-O'||m.san==='O-O-O')return 30;return 0;}

function render(){
  const bd=document.getElementById('board');bd.innerHTML='';
  const hist=game.history({verbose:true});
  // For nav mode, build a position
  let viewGame=game;
  if(navIdx>=0&&navIdx<hist.length){
    viewGame=new Chess();
    for(let i=0;i<=navIdx;i++)viewGame.move(hist[i]);
  }
  const ba=viewGame.board();
  const isLive=navIdx===-1;
  const allMvs=isLive&&sel?game.moves({verbose:true}).filter(m=>m.from===sel):[];
  const vt=allMvs.map(m=>m.to);
  const navFrom=navIdx>=0?hist[navIdx]?.from:null,navTo=navIdx>=0?hist[navIdx]?.to:null;
  let kingChk=null;if(isLive&&game.isCheck()){for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=ba[r][c];if(p&&p.type==='k'&&p.color===game.turn())kingChk=String.fromCharCode(97+c)+(8-r);}}

  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const sq=String.fromCharCode(97+c)+(8-r),p=ba[r][c],light=(r+c)%2===1;
    const d=document.createElement('div');
    d.className='sq '+(light?'light':'dark');
    d.dataset.sq=sq;
    if(isLive&&sq===sel)d.classList.add('selected');
    if(isLive&&last&&(sq===last.from||sq===last.to))d.classList.add('last-move');
    if(isLive&&hints.includes(sq))d.classList.add('hint-sq');
    if(isLive&&sq===kingChk)d.classList.add('check-sq');
    if(isLive&&vt.includes(sq))d.classList.add(p&&p.color!==game.turn()?'valid-cap':'valid');
    if(isLive&&disambig&&disambig.froms.includes(sq))d.classList.add('disambig-src');
    if(!isLive&&(sq===navFrom||sq===navTo))d.classList.add('nav-sq');
    if(isLive&&sq===dragSq)d.classList.add('drag-src');
    if(c===0){const s=document.createElement('span');s.className='coord-r';s.textContent=8-r;d.appendChild(s);}
    if(r===7){const s=document.createElement('span');s.className='coord-f';s.textContent=String.fromCharCode(97+c);d.appendChild(s);}
    if(p){
      const i=document.createElement('div');i.className='piece';i.innerHTML=S[p.color+p.type.toUpperCase()]||'';
      if(isLive&&p.color===game.turn()&&!gameOver&&!aiOn&&!isHinting&&(isLocal||game.turn()==='w')){
        i.style.cursor='grab';
        i.addEventListener('pointerdown',(e)=>startDrag(sq,e),{passive:false});
      }
      d.appendChild(i);
    }
    d.addEventListener('touchend',(e)=>{e.preventDefault();lastTouchSq=sq;lastTouchTime=Date.now();click(sq);},{passive:false});
    d.onclick=()=>{if(Date.now()-lastTouchTime>400||lastTouchSq!==sq)click(sq);lastTouchSq=null;};
    bd.appendChild(d);
  }

  // Status
  const dot=document.getElementById('dot'),st=document.getElementById('status-text');
  const cb=document.getElementById('card-bot'),ct=document.getElementById('card-top'),chk=document.getElementById('check-badge');
  if(!isLive){dot.className='dot';st.textContent=`Viewing move ${navIdx+1}/${hist.length}`;}
  else if(gameOver){dot.className='dot red';st.textContent='Game Over';}
  else if(isHinting){dot.className='dot yellow';st.textContent='Finding best move…';}
  else if(aiOn){dot.className='dot yellow';st.textContent='AI is thinking…';}
  else{dot.className='dot';st.textContent=isLocal?(game.turn()==='w'?'White\'s turn':'Black\'s turn'):'Your turn';}
  chk.style.display=isLive&&!gameOver&&game.isCheck()?'block':'none';
  if(!gameOver&&isLive){if(game.turn()==='w'){cb.classList.add('active');ct.classList.remove('active');}else{ct.classList.add('active');cb.classList.remove('active');}}
  else{cb.classList.remove('active');ct.classList.remove('active');}

  renderTimers();
  renderMoveHistory();
  updateEvalBar(isLive?game:viewGame);
  renderCaptured(game);
  renderNavButtons();
}

function renderMoveHistory(){
  const hist=game.history({verbose:true}),mv=document.getElementById('moves');
  if(!hist.length){mv.innerHTML='<p style="color:var(--muted);font-size:11px;text-align:center;padding:6px">No moves yet</p>';return;}
  let h='';
  for(let i=0;i<hist.length;i+=2){
    const mIdx1=i,mIdx2=i+1;
    const cur1=navIdx===mIdx1,cur2=navIdx===mIdx2;
    h+=`<div class="move-row${cur1?' current':''}" onclick="navGo(${mIdx1})"><span class="move-num">${Math.floor(i/2)+1}.</span><span class="move-w">${hist[mIdx1].san}</span><span class="move-b ${cur2?'current':''}" onclick="event.stopPropagation();navGo(${mIdx2})">${hist[mIdx2]?.san||''}</span></div>`;
  }
  mv.innerHTML=h;
  // Scroll to current
  const cur=mv.querySelector('.current');if(cur)cur.scrollIntoView({block:'nearest'});
}

function renderNavButtons(){
  const hist=game.history();
  const len=hist.length;
  document.getElementById('nav-start').disabled=navIdx===0||(navIdx===-1&&!len);
  document.getElementById('nav-prev').disabled=navIdx===0||(navIdx===-1&&!len);
  document.getElementById('nav-live').disabled=navIdx===-1;
  document.getElementById('nav-next').disabled=navIdx===-1||(navIdx>=len-1);
  document.getElementById('nav-end').disabled=navIdx===-1;
  document.getElementById('nav-live').style.color=navIdx===-1?'var(--pr)':'';
}

// ── Click Handler ─────────────────────────────────────────────────────────
function click(sq){
  // In nav mode, click goes live
  if(navIdx!==-1){navGo(-1);return;}
  if(gameOver||aiOn||isHinting)return;
  if(!isLocal&&game.turn()==='b')return;
  const allMvs=game.moves({verbose:true});
  // Disambiguation mode
  if(disambig){
    if(disambig.froms.includes(sq)){const target=disambig.to,mv=allMvs.find(m=>m.from===sq&&m.to===target);disambig=null;if(mv){if(mv.flags?.includes('p')){promo={from:sq,to:target};showPromo(game.turn());return;}doMove(mv.san);return;}}
    disambig=null;render();return;
  }
  // Click own piece → instant best move
  const fromHere=allMvs.filter(m=>m.from===sq);
  if(fromHere.length){const mv=fromHere.sort((a,b)=>sm(b)-sm(a))[0];if(mv.flags?.includes('p')){promo={from:sq,to:mv.to};sel=null;showPromo(game.turn());return;}sel=null;doMove(mv.san);return;}
  // Click destination → 1-click move
  const toHere=allMvs.filter(m=>m.to===sq);
  if(toHere.length===1){const mv=toHere[0];if(mv.flags?.includes('p')){promo={from:mv.from,to:sq};sel=null;showPromo(game.turn());return;}sel=null;doMove(mv.san);return;}
  if(toHere.length>1){disambig={to:sq,froms:toHere.map(m=>m.from)};render();return;}
  render();
}

// ── doMove ────────────────────────────────────────────────────────────────
function doMove(m){
  let r;try{r=game.move(m);}catch(e){sel=null;render();return;}if(!r)return;
  last={from:r.from,to:r.to};sel=null;hints=[];disambig=null;navIdx=-1;if(htTO)clearTimeout(htTO);
  // Sounds
  if(r.san==='O-O'||r.san==='O-O-O')playSound('castle');
  else if(r.captured)playSound('capture');
  else playSound('move');
  if(game.isCheck())setTimeout(()=>playSound('check'),120);
  if(r.promotion)setTimeout(()=>playSound('promote'),80);
  if(game.isGameOver()){
    gameOver=true;clearInterval(timerIv);
    let t,msg,ic='♟',result='draw';
    if(game.isCheckmate()){const w=game.turn()==='w';t=w?'Black Wins!':'White Wins!';msg=`${w?'Black':'White'} wins by checkmate`;ic=w?'♛':'♕';result=w?'loss':'win';}
    else if(game.isStalemate()){t='Draw';msg='Stalemate — no legal moves';ic='🤝';}
    else if(game.isInsufficientMaterial()){t='Draw';msg='Insufficient material';ic='🤝';}
    else if(game.isThreefoldRepetition()){t='Draw';msg='Threefold repetition';ic='🤝';}
    else{t='Draw';msg='Game drawn';ic='🤝';}
    setTimeout(()=>{const delta=updateElo(result);playSound(result==='win'?'win':'lose');showOver(ic,t,msg,delta);},600);
  }else{
    clearInterval(timerIv);
    if(baseTime!==Infinity)timerIv=setInterval(tick,100);
    if(!isLocal&&game.turn()==='b')schedAI();
  }
  render();
}

// ── AI ────────────────────────────────────────────────────────────────────
function schedAI(){
  aiOn=true;render();
  // Try opening book first
  const bookMove=getBookMove(game);
  if(bookMove&&game.history().length<=20){
    const delay=300+Math.random()*400;
    setTimeout(()=>{aiOn=false;doMove(bookMove);},delay);
    return;
  }
  if(aiWorker){aiWorker.postMessage({fen:game.fen(),d:diff,isHint:false});}
  else{
    const DP={beginner:1,easy:2,medium:3,hard:4,master:5};
    setTimeout(()=>{
      const mvs=game.moves({verbose:true});
      if(!mvs.length){aiOn=false;render();return;}
      const mv=mvs[Math.floor(Math.random()*mvs.length)];
      aiOn=false;if(mv)doMove(mv.san);else render();
    },400);
  }
}

window.requestHint=()=>{
  if(gameOver||aiOn||isHinting)return;
  const hd=diff==='local'?'medium':diff;
  isHinting=true;render();
  if(aiWorker){aiWorker.postMessage({fen:game.fen(),d:hd,isHint:true});}
  else{setTimeout(()=>{isHinting=false;render();},500);}
};

// ── Modals ────────────────────────────────────────────────────────────────
function showPromo(color){
  const ps=[['q','Queen'],['r','Rook'],['b','Bishop'],['n','Knight']];
  document.getElementById('promo-grid').innerHTML=ps.map(([t,n])=>`<div class="promo-piece" onclick="selPromo('${t}')"><div style="width:44px;height:44px">${S[color+t.toUpperCase()]||''}</div>${n}</div>`).join('');
  document.getElementById('promo-modal').style.display='flex';
}
window.selPromo=t=>{document.getElementById('promo-modal').style.display='none';if(promo){doMove({from:promo.from,to:promo.to,promotion:t});promo=null;}};

function showOver(ic,title,msg,eloDelta){
  document.getElementById('over-icon').textContent=ic;
  document.getElementById('over-title').textContent=title;
  document.getElementById('over-msg').textContent=msg;
  const eloEl=document.getElementById('over-elo');
  if(eloDelta&&!isLocal){const sign=eloDelta>0?'+':'';eloEl.textContent=`ELO: ${sign}${eloDelta} → ${loadElo()}`;}
  else eloEl.textContent='';
  document.getElementById('over-modal').style.display='flex';
}

// ── Controls ──────────────────────────────────────────────────────────────
window.newGame=()=>{
  game=new Chess();sel=null;last=null;hints=[];disambig=null;promo=null;navIdx=-1;
  gameOver=false;aiOn=false;isHinting=false;dragSq=null;
  if(dragEl){dragEl.remove();dragEl=null;}
  timers={w:baseTime,b:baseTime};clearInterval(timerIv);
  if(baseTime!==Infinity)timerIv=setInterval(tick,100);
  document.getElementById('over-modal').style.display='none';
  document.getElementById('promo-modal').style.display='none';
  playSound('start');renderMeta();render();
};

window.setDiff=(d,btn)=>{
  diff=d;isLocal=d==='local';
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
  document.getElementById('name-top').textContent=isLocal?'Player 2 (Black)':`AI (${d[0].toUpperCase()+d.slice(1)})`;
  document.getElementById('name-bot').textContent=isLocal?'Player 1 (White)':'You (White)';
  newGame();
};

window.undoMove=()=>{
  if(aiOn||isHinting)return;
  const wasOver=gameOver;
  const hist=game.history();if(!hist.length)return;
  const n=isLocal?1:hist.length>=2?2:1;
  for(let i=0;i<n;i++)if(game.history().length)game.undo();
  last=null;hints=[];disambig=null;navIdx=-1;
  gameOver=false;
  if(wasOver&&baseTime!==Infinity){clearInterval(timerIv);timerIv=setInterval(tick,100);}
  render();
};

window.resignGame=()=>{
  if(gameOver)return;gameOver=true;clearInterval(timerIv);
  const r=game.turn()==='w'?'White':'Black';
  const delta=updateElo('loss');playSound('lose');
  showOver('⚑',`${r} Resigned`,`${r==='White'?'Black':'White'} wins!`,delta);render();
};

window.exportPGN=()=>{
  const pgn=game.pgn()||'No moves yet';
  navigator.clipboard.writeText(pgn).then(()=>{
    const btn=document.getElementById('pgn-btn');const orig=btn.textContent;
    btn.textContent='✓ Copied!';btn.style.color='#22c55e';
    setTimeout(()=>{btn.textContent=orig;btn.style.color='';},2000);
  }).catch(()=>prompt('Copy PGN:',pgn));
};

// ── Init ──────────────────────────────────────────────────────────────────
if(baseTime!==Infinity)timerIv=setInterval(tick,100);
renderMeta();render();
</script>
